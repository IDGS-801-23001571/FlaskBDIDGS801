{% extends "layout.html" %}
{% import "_macros.html" as macros %}

{% block container %}

<form method="POST" action="{{ url_for('Alumnos') }}" class="max-w-sm mx-auto space-y-4 w-full">
    {{ form.csrf_token }}
    <div>
        <label for="nombre" class="block mb-2.5 text-sm font-medium text-gray-900">Nombre</label>
        <input type="text" id="nombre" name="nombre"
               class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full px-3 py-2"
               required />
    </div>

    <div>
        <label for="apaterno" class="block mb-2.5 text-sm font-medium text-gray-900">Apellido Paterno</label>
        <input type="text" id="apaterno" name="apaterno"
               class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full px-3 py-2"
               required />
    </div>

    <div>
        <label for="email" class="block mb-2.5 text-sm font-medium text-gray-900">Email</label>
        <input type="email" id="email" name="email"
               class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full px-3 py-2"
               required />
    </div>

    <button type="submit"
            class="text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2.5">
        Submit
    </button>
</form>

{% endblock %}
