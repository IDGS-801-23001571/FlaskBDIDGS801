{% extends "layout.html" %}
{% block container %}

<form method="POST" action="{{ url_for('cursos.cursos_crud') }}" class="max-w-sm mx-auto space-y-4 w-full">
  {{ form.csrf_token }}
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <div>
    <label class="block mb-2.5 text-sm font-medium text-gray-900">Nombre</label>
    <input type="text" name="nombre" class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full px-3 py-2" required>
  </div>

  <div>
    <label class="block mb-2.5 text-sm font-medium text-gray-900">Descripción</label>
    <input type="text" name="descripcion" class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full px-3 py-2">
  </div>

  <div>
  <label class="block mb-2.5 text-sm font-medium text-gray-900">Maestro</label>
  <select name="maestro_id"
    class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full px-3 py-2"
    required>
    <option value="">Selecciona un maestro</option>
    {% for maestro in maestros %}
      <option value="{{ maestro.matricula }}">
        {{ maestro.matricula }} - {{ maestro.nombre }} {{ maestro.apellidos }}
      </option>
    {% endfor %}
  </select>
</div>

  <div class="flex gap-2">
    <button type="submit" class="text-white bg-blue-600 hover:bg-blue-700 font-medium rounded-lg text-sm px-4 py-2.5">
      Guardar
    </button>

    <a href="{{ url_for('cursos.listado_cursos') }}"
       class="text-gray-900 bg-white border border-gray-300 hover:bg-gray-100 font-medium rounded-lg text-sm px-4 py-2.5">
      Cancelar
    </a>
  </div>
</form>

{% endblock %}
