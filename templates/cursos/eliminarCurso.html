{% extends 'layout.html' %}
{% block container %}

<div class="mt-5">
  <form action="" method="POST" novalidate class="max-w-md mx-auto mt-5">
    {{ form.csrf_token }}
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="id" value="{{ form.id.data }}">

    <div class="mb-5">
      <label class="block mb-2 text-sm font-medium text-gray-900">Nombre</label>
      <input type="text" name="nombre" value="{{ form.nombre.data }}"
        class="block w-full px-3 py-2 text-sm text-gray-900 bg-gray-100 border border-gray-300 rounded-lg"
        readonly>
    </div>

    <div class="mb-5">
      <label class="block mb-2 text-sm font-medium text-gray-900">Descripción</label>
      <input type="text" name="descripcion" value="{{ form.descripcion.data }}"
        class="block w-full px-3 py-2 text-sm text-gray-900 bg-gray-100 border border-gray-300 rounded-lg"
        readonly>
    </div>

    <div class="mb-5">
      <label class="block mb-2 text-sm font-medium text-gray-900">Maestro ID</label>
      <input type="text" name="maestro_id" value="{{ form.maestro_id.data }}"
        class="block w-full px-3 py-2 text-sm text-gray-900 bg-gray-100 border border-gray-300 rounded-lg"
        readonly>
    </div>

    <button type="submit"
      class="inline-flex items-center text-white bg-red-600 hover:bg-red-700 font-medium rounded-lg text-sm px-4 py-2.5">
      Eliminar
    </button>

    <a href="{{ url_for('cursos.listado_cursos') }}"
      class="inline-flex items-center ml-3 text-white bg-gray-500 hover:bg-gray-600 font-medium rounded-base text-sm px-4 py-2.5 text-center leading-5">
      Cancelar
    </a>
  </form>
</div>

{% endblock %}
