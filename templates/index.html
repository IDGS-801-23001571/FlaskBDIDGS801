{%extends 'layout.html'%}
{%block container%}
<div class="py-32 relative overflow-x-auto sm:rounded-lg">


  <a href="/alumnos" class="flex w-[98%] items-center gap-2
          text-white bg-gradient-to-r from-green-400 via-green-500 to-green-600
          hover:bg-gradient-to-br focus:ring-3 focus:outline-none focus:ring-green-300
          dark:focus:ring-green-800 shadow-lg shadow-green-500/50 dark:shadow-lg dark:shadow-green-800/10
          font-medium rounded-base text-sm px-4 py-2.5 leading-5 ml-2 my-1">
    <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24"
      height="24" fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M16 12h4m-2 2v-4M4 18v-1a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v1a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1Zm8-10a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
    </svg>

    Nuevo
  </a>


  <div class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default mt-3">

    <table class="w-full text-sm text-left rtl:text-right text-body">
      <thead class="text-sm text-body bg-neutral-secondary-medium border-b border-default-medium">
        <tr>
          <th scope="col" class="px-6 py-3 font-medium">
            Nombre
          </th>
          <th scope="col" class="px-6 py-3 font-medium">
            Apaterno
          </th>
          <th scope="col" class="px-6 py-3 font-medium">
            Email
          </th>
          <th scope="col" class="px-6 py-3 font-medium">
            Editar
          </th>
          <th scope="col" class="px-6 py-3 font-medium">
            <!--             <span class="sr-only">Detalles</span>-->
            Detalles
          </th>
          <th scope="col" class="px-6 py-3 font-medium">
            Eliminar
          </th>
        </tr>
      </thead>
      <tbody>
        {%for alum in alumno%}
        <tr class="bg-neutral-primary-soft border-b border-default hover:bg-neutral-secondary-medium">
          <th scope="row" class="px-6 py-4 font-medium text-heading whitespace-nowrap">
            {{alum.nombre}}
          </th>
          <td class="px-6 py-4">
            {{alum.apaterno}}
          </td>
          <td class="px-6 py-4">
            {{alum.email}}
          </td>

          <td class="px-6 py-4 text-right">
            <a href="modificar?id={{ alum.id }}">

            <button type="button"
              class="inline-flex items-center text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300 dark:focus:ring-blue-800 font-medium rounded-base text-sm px-4 py-2.5 text-center leading-5">
              <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="none">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="m14.304 4.844 2.852 2.852M7 7H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-4.5m2.409-9.91a2.017 2.017 0 0 1 0 2.853l-6.844 6.844L8 14l.713-3.565 6.844-6.844a2.015 2.015 0 0 1 2.852 0Z" />
              </svg>
              Editar
            </button>
          </td>
          <td class="px-6 py-4 text-right">
            <a href="detalles?id={{ alum.id }}">
              <button type="button"
                class="inline-flex items-center text-white bg-gradient-to-r from-purple-500 via-purple-600 to-purple-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-purple-300 dark:focus:ring-purple-800 font-medium rounded-base text-sm px-4 py-2.5 text-center leading-5">
                <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                  width="24" height="24" fill="none" viewBox="0 0 24 24">
                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 4h3a1 1 0 0 1 1 1v15a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h3m0 3h6m-6 7 2 2 4-4m-5-9v4h4V3h-4Z" />
                </svg>
                Detalles
              </button>
            </a>
          </td>
          <td class="px-6 py-4 text-right">
            <button type="button"
              class="inline-flex items-center text-white bg-gradient-to-r from-red-400 via-red-500 to-red-600 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-red-300 dark:focus:ring-red-800 font-medium rounded-base text-sm px-4 py-2.5 text-center leading-5">
              <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                width="24" height="24" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M5 7h14m-9 3v8m4-8v8M10 3h4a1 1 0 0 1 1 1v3H9V4a1 1 0 0 1 1-1ZM6 7h12v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7Z" />
              </svg>
              Eliminar
            </button>
          </td>
        </tr>
        {%endfor%}
      </tbody>
    </table>
  </div>

</div>


{%endblock%}
