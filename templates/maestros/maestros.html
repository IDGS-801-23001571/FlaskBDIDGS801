{% extends "layout.html" %}

{% block container %}

<form method="POST" action="{{ url_for('maestros.maestros_crud') }}" class="max-w-sm mx-auto space-y-4 w-full">
  {{ form.csrf_token }}
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <div class="hidden">
    <label for="matricula" class="block mb-2.5 text-sm font-medium text-gray-900">Matrícula</label>
    <input type="number" id="matricula" name="matricula" value="{{ request.form.get('matricula','') }}"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-3 py-2" />
  </div>

  <div>
    <label for="nombre" class="block mb-2.5 text-sm font-medium text-gray-900">Nombre</label>
    <input type="text" id="nombre" name="nombre" value="{{ request.form.get('nombre','') }}"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-3 py-2" required />
  </div>

  <div>
    <label for="apellidos" class="block mb-2.5 text-sm font-medium text-gray-900">Apellidos</label>
    <input type="text" id="apellidos" name="apellidos" value="{{ request.form.get('apellidos','') }}"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-3 py-2" required />
  </div>

  <div>
    <label for="especialidad" class="block mb-2.5 text-sm font-medium text-gray-900">Especialidad</label>
    <input type="text" id="especialidad" name="especialidad" value="{{ request.form.get('especialidad','') }}"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-3 py-2" required />
  </div>

  <div>
    <label for="email" class="block mb-2.5 text-sm font-medium text-gray-900">Email</label>
    <input type="email" id="email" name="email" value="{{ request.form.get('email','') }}"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-3 py-2" required />
  </div>

  <div class="flex gap-2">
    <button type="submit"
      class="text-white bg-blue-600 hover:bg-blue-700 font-medium rounded-lg text-sm px-4 py-2.5">
      Guardar
    </button>

    <a href="{{ url_for('maestros.listado_maestros') }}"
      class="text-gray-900 bg-white border border-gray-300 hover:bg-gray-100 font-medium rounded-lg text-sm px-4 py-2.5">
      Cancelar
    </a>
  </div>
</form>

{% endblock %}
